# =============================================================================
# Limitations
# =============================================================================
# 1. English only - not designed for other languages
# 2. Minimum 30 words - shorter texts return human label with error
# 3. Max 512 tokens - longer texts are truncated
# 4. Large model - requires significant GPU memory
# 5. Recent release (Oct 2025) - limited external validation
