# AdaLoc: Machine-Generated Text Localization (ACL Findings 2024)
# Sentence-level MGT localization using RoBERTa + lightweight adapter with sliding window
# Paper: https://arxiv.org/abs/2402.11744
# GitHub: https://github.com/Zhongping-Zhang/MGT_Localization

model: adaloc

# Model Configuration
roberta_model: roberta-large-openai-detector  # Base RoBERTa detector for feature extraction
# Official checkpoint downloaded from https://drive.google.com/drive/folders/1D8qYcVoYgwNG7IzadF01W3eyPiuPRnY6
# (trained on GoodNews 10K articles with gpt2-xl generator, 3 epochs, lr=1e-5, batch=16, window=3)
checkpoint_path: checkpoints/adaloc/logs/adaloc_goodnews/epoch-best.pkl
hidden_size: 1024                              # RoBERTa-large hidden size
num_labels: 3                                  # Sliding window output size (= window_size)
dropout: 0.1
cache_dir: cache/hub                           # HF cache directory (symlink-friendly)

# Sliding window parameters
window_size: 3    # Number of sentences per window
window_step: 1    # Step size between windows

# Device
device: auto
