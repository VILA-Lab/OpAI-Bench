# SeqXGPT Detector (Word/Sentence-level AI text boundary detection)
# Detects AI-written word intervals within mixed human/AI text
# Paper: https://arxiv.org/abs/2310.08903
# GitHub: https://github.com/Jihuai-wpy/SeqXGPT
#
# Achieves 95.6% word accuracy with paper's exact models (gpt2-xl, gpt-neo-2.7B, gpt-j-6B, llama-7B)
# Requires ~43GB VRAM total - use feature_devices to distribute across GPUs

model: seqxgpt-finetuned

# Classifier Configuration
# Type of classifier architecture to use
# Options: "transformer" (recommended), "cnn"
classifier_type: transformer

# Path to trained classifier weights
# Supports:
#   - Local path: /path/to/seqxgpt_transformer.pt
#   - HuggingFace Hub: zcahjl3/seqxgpt-detector (auto-downloads seqxgpt_transformer.pt)
#   - HuggingFace Hub with filename: zcahjl3/seqxgpt-detector/seqxgpt_transformer.pt
# Set to null for untrained model (unreliable predictions)
checkpoint_path: ???

# Feature Extraction Models
# These LLMs are used to extract log-probability features
# More models = better accuracy but more GPU memory (~3GB per model)
#
# Supported models:
#   gpt2, gpt2-medium, gpt2-large, gpt2-xl, gpt-neo-125m, gpt-neo-1.3b
#
# The trained checkpoint uses paper's exact feature models:
#   gpt2-xl (1.5B), gpt-neo-2.7B, gpt-j-6B, llama-7B
# IMPORTANT: Feature models MUST match what the checkpoint was trained with.
# Using different sizes (e.g. gpt2 instead of gpt2-xl) will produce garbage results.
feature_models:
  - gpt2-xl
  - gpt-neo-2.7b
  - gpt-j-6b
  - llama-7b

# Device Settings
# Options: "auto" (recommended), "cuda", "cuda:0", "cpu"
device: auto

# Per-model device assignment for large models
# Each model can be loaded on a different GPU to fit in memory
# Order matches feature_models list above
# Uncomment to distribute across GPUs:
feature_devices:
  - cuda:0  # gpt2-xl (~6GB)
  - cuda:1  # gpt-neo-2.7b (~11GB)
  - cuda:2  # gpt-j-6b (~12GB)
  - cuda:3  # llama-7b (~14GB)

# Model Parameters
# Maximum number of words per document (paper default: 1024)
seq_len: 1024

# HuggingFace model cache directory (optional)
cache_dir: null

# Detection Configuration
# Threshold for binary classification (not used for interval detection)
threshold: 0.5

# =============================================================================
# Performance Notes
# =============================================================================
# GPU Memory: ~43GB total with paper's models (distribute across 4 GPUs)
# Speed: ~2-5s per text (depends on text length and number of feature models)
#
# IMPORTANT: Requires trained classifier weights for accurate results
# Without checkpoint_path, model will use random weights (unreliable).

# =============================================================================
# Training Instructions
# =============================================================================
# Retrained checkpoint at zcahjl3/seqxgpt-detector (95.6% word acc on SeqXGPT-Bench).
# To retrain from scratch:
#
# 1. Prepare training data in SeqXGPT format:
#    - JSONL file with: text, label, prompt_len, label_int, begin_idx_list, ll_tokens_list
#
# 2. Extract features (if not already done):
#    cd baseline/seqxgpt/SeqXGPT
#    python ./dataset/gen_features.py --get_en_features \
#        --input_file data/train.jsonl \
#        --output_file data/train_features.jsonl
#
# 3. Train the model:
#    cd baseline/seqxgpt/SeqXGPT/SeqXGPT
#    python train.py --gpu=0
#
# 4. Set checkpoint_path to the trained weights path

# =============================================================================
# Output Format (matches GigaCheck for compatibility)
# =============================================================================
# {
#   "text": str,           # Input text
#   "label": 0/1,          # 0=human, 1=AI (any AI content)
#   "score": float,        # AI content coverage ratio (0.0-1.0)
#   "metadata": {
#     "model": "seqxgpt",
#     "classifier_type": "transformer",
#     "pred_label": "human"/"ai"/"mixed",
#     "ai_intervals": [[start, end], ...],  # Character positions
#     "word_predictions": [...],  # BIOES labels per word
#     "words": [...],  # Words in text
#     "word_positions": [...]  # (start, end) per word
#   }
# }

# =============================================================================
# Usage Example
# =============================================================================
# from opai_bench_detectors import pipeline
#
# # With trained checkpoint
# pipe = pipeline("ai-text-detection", model="seqxgpt",
#                 checkpoint_path="/path/to/trained/model.pt")
#
# result = pipe("Your text here with potentially AI-generated content...")
# print(result['metadata']['ai_intervals'])  # [[45, 120], [200, 350]]

# Self-trained classifier label override:
# Our train_seqxgpt_classifier.py used 2-class binary {ai, human} × BMES = 8 classes
# (instead of paper's 6-class {gpt2,gptneo,gptj,llama,gpt3re,human} × BMES = 24 classes).
# Set this to match the trained checkpoint's classifier head shape.
en_labels:
  ai: 0
  human: 1
