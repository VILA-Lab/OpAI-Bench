# SenDetEX: Sentence-Level AI-Generated Text Detection (EMNLP 2025)
# Style and context fusion for sentence-level detection in human-AI hybrid content
# Paper: https://aclanthology.org/2025.emnlp-main.268/
# GitHub: https://github.com/TristoneJiang/SenDetEX

model: sendetex

# Model Configuration
# Per paper (EMNLP 2025, Appendix B): proxy = LLaMA-2-7B LoRA-fine-tuned on WildChat
# ("FTPM"). We trained on SeqXGPT-Bench instead of the paper's AutoFill-Refine data,
# and used vanilla huggyllama/llama-7b as proxy (skipped the LoRA FTPM fine-tuning).
# Same backbone serves as both feature encoder and regeneration model.
proxy_model: huggyllama/llama-7b
checkpoint_path: checkpoints/sendetex/seqxgpt_bench/best.pt
d_model: 4096                       # LLaMA-7B hidden size

# Regeneration model (SAME as proxy per paper Section 3.1: r_i generated by Mproxy)
regen_model: huggyllama/llama-7b
regen_max_length: 128               # Max tokens for regeneration

# Device
device: auto

# Inference
max_length: 512
